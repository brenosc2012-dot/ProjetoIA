<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c5cff">
<title>EstudaMais — Aventura de Estudos</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EstudaMais">
<style>
/* ============================================================
   ESTUDAMAIS — App de estudos gamificado (5º ano)
   Estrutura do CSS:
   1. Reset & variáveis
   2. Layout base mobile-first
   3. Componentes (botões, cards, barras)
   4. Telas do aluno
   5. Painel do professor
   6. Gamificação (XP, vidas, celebração, confete)
   7. Mascote
   8. Animações
   ============================================================ */

/* ---------- 1. RESET & VARIÁVEIS ---------- */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root{
  --brand:#7c5cff; --brand-d:#5b3fd6;     /* cor principal do app (botões/topo) */
  --green:#58cc02; --green-d:#46a302;      /* usado só para feedback de acerto */
  --blue:#1cb0f6; --red:#ff4b4b; --yellow:#ffc800;
  --gray:#e5e5e5; --gray-d:#afafaf; --text:#3c3c3c;
  --bg:#fff; --shadow:0 4px 0 rgba(0,0,0,.15);
}
html,body{ height:100%; }
body{
  font-family:'Segoe UI',-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif;
  font-size:16px; color:var(--text);
  background:#e8f4ff; line-height:1.5;
  display:flex; justify-content:center;
  overscroll-behavior:none;
}
#app{
  width:100%; max-width:480px;
  height:100vh; height:100dvh;            /* altura fixa da viewport (dvh = melhor no mobile) */
  background:var(--bg); position:relative;
  display:flex; flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.08);
  overflow:hidden;
}

/* ---------- 2. LAYOUT BASE ---------- */
.screen{ display:none; flex-direction:column; flex:1; min-height:0; animation:fadeIn .25s ease; }
.screen.active{ display:flex; }
.topbar{
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; background:var(--bg);
  border-bottom:2px solid var(--gray); position:sticky; top:0; z-index:10;
}
.topbar h2{ font-size:18px; flex:1; }
.content{ flex:1; min-height:0; padding:16px; overflow-y:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:var(--brand) #ececff; }
/* barra de rolagem visível e colorida (navegadores WebKit/Chromium) */
.content::-webkit-scrollbar{ width:10px; }
.content::-webkit-scrollbar-track{ background:#ececff; border-radius:10px; }
.content::-webkit-scrollbar-thumb{ background:var(--brand); border-radius:10px; border:2px solid #ececff; }
.content::-webkit-scrollbar-thumb:active{ background:var(--brand-d); }
.back-btn{
  width:42px; height:42px; border:none; background:none; cursor:pointer;
  font-size:26px; color:var(--gray-d); border-radius:12px; flex-shrink:0;
}
.back-btn:active{ background:var(--gray); }

/* ---------- 3. COMPONENTES ---------- */
.btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; min-height:52px; padding:14px 20px;
  border:none; border-radius:16px; cursor:pointer;
  font-size:17px; font-weight:700; font-family:inherit;
  color:#fff; background:var(--brand); box-shadow:0 4px 0 var(--brand-d);
  text-transform:uppercase; letter-spacing:.5px;
  transition:transform .05s, box-shadow .05s;
}
.btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--brand-d); }
.btn:disabled{ background:var(--gray); box-shadow:0 4px 0 var(--gray-d); color:var(--gray-d); cursor:default; }
.btn.blue{ background:var(--blue); box-shadow:0 4px 0 #1899d6; }
.btn.blue:active{ box-shadow:0 1px 0 #1899d6; }
.btn.red{ background:var(--red); box-shadow:0 4px 0 #e63939; }
.btn.gray{ background:#fff; color:var(--gray-d); box-shadow:0 4px 0 var(--gray); border:2px solid var(--gray); }
.btn.gray:active{ box-shadow:0 1px 0 var(--gray); }
.btn.small{ min-height:44px; font-size:14px; padding:10px 14px; width:auto; }

input,textarea,select{
  width:100%; padding:14px; font-size:16px; font-family:inherit;
  border:2px solid var(--gray); border-radius:12px; background:#f7f7f7; color:var(--text);
  margin-bottom:12px;
}
input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--blue); background:#fff; }
textarea{ resize:vertical; min-height:90px; }
label{ display:block; font-weight:700; font-size:14px; margin-bottom:6px; color:#777; }

.card{
  background:#fff; border:2px solid var(--gray); border-bottom-width:4px;
  border-radius:16px; padding:16px; margin-bottom:12px; cursor:pointer;
  transition:transform .05s;
}
.card:active{ transform:scale(.98); }

/* ---------- 4. TELAS DO ALUNO ---------- */
/* Home / seleção de disciplinas */
.home-header{
  background:linear-gradient(135deg,#7c5cff 0%,#a06bff 55%,#4d9fff 100%); color:#fff;
  padding:20px 16px 24px; border-radius:0 0 24px 24px;
}
.home-header .greeting{ font-size:20px; font-weight:800; }
.home-header .sub{ font-size:14px; opacity:.9; }
.stat-row{ display:flex; gap:10px; margin-top:14px; }
.stat-pill{
  flex:1; background:rgba(255,255,255,.2); border-radius:14px;
  padding:8px; text-align:center; backdrop-filter:blur(4px);
}
.stat-pill .v{ font-size:20px; font-weight:800; }
.stat-pill .l{ font-size:11px; opacity:.9; text-transform:uppercase; }

.subj-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.subj-card{
  border-radius:18px; padding:16px 12px; color:#fff; cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.18); position:relative; overflow:hidden;
  transition:transform .05s, box-shadow .05s; min-height:118px;
  display:flex; flex-direction:column; justify-content:space-between;
}
.subj-card:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.18); }
.subj-card .icon{ font-size:34px; }
.subj-card .name{ font-size:16px; font-weight:800; }
.subj-card .meta{ font-size:11px; opacity:.95; font-weight:600; }
.subj-card .lvl-badge{
  position:absolute; top:8px; right:8px; background:rgba(0,0,0,.18);
  border-radius:10px; padding:2px 8px; font-size:11px; font-weight:800;
}

/* Lista de lições */
.lesson-item{
  display:flex; align-items:center; gap:14px;
}
.lesson-item .bubble{
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.15);
}
.lesson-item .bubble.done{ background:var(--yellow)!important; box-shadow:0 4px 0 #d9a900!important; }
.lesson-item .info{ flex:1; }
.lesson-item .info .t{ font-weight:800; font-size:16px; }
.lesson-item .info .d{ font-size:12px; color:var(--gray-d); }

/* Conteúdo da lição */
.lesson-content{ font-size:17px; line-height:1.7; white-space:pre-wrap; }
.lesson-content h1,.lesson-content h2{ margin:8px 0; }

/* Exercícios */
.exercise-top{ padding:12px 16px; display:flex; align-items:center; gap:12px; }
.progress-track{ flex:1; height:16px; background:var(--gray); border-radius:10px; overflow:hidden; }
.progress-fill{ height:100%; background:var(--green); border-radius:10px; transition:width .3s; width:0; }
.hearts{ font-size:20px; letter-spacing:2px; flex-shrink:0; }
.q-prompt{ font-size:21px; font-weight:800; margin:10px 0 20px; line-height:1.4; }
.opt{
  display:flex; align-items:center; gap:12px;
  border:2px solid var(--gray); border-bottom-width:4px; border-radius:14px;
  padding:16px; margin-bottom:12px; cursor:pointer; font-size:17px; font-weight:600;
  background:#fff; transition:transform .05s, border-color .1s, background .1s;
}
.opt:active{ transform:scale(.98); }
.opt.selected{ border-color:var(--blue); background:#ddf4ff; color:#1899d6; }
.opt.correct{ border-color:var(--green); background:#d7ffb8; color:var(--green-d); }
.opt.wrong{ border-color:var(--red); background:#ffdfe0; color:var(--red); }
.opt .letter{
  width:30px; height:30px; border-radius:8px; border:2px solid var(--gray);
  display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; font-size:14px;
}
/* completar lacunas */
.fill-input{ font-size:20px; text-align:center; font-weight:700; }

/* feedback footer */
.feedback-bar{
  padding:18px 16px 24px; border-top:2px solid var(--gray);
  transition:background .2s;
}
.feedback-bar.correct{ background:#d7ffb8; }
.feedback-bar.wrong{ background:#ffdfe0; }
.feedback-msg{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; margin-bottom:12px; }
.feedback-bar.correct .feedback-msg{ color:var(--green-d); }
.feedback-bar.wrong .feedback-msg{ color:var(--red); }

/* Conclusão / celebração */
.celebrate{
  flex:1; min-height:0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; justify-content:safe center; /* 'safe' evita cortar o topo ao rolar */
  text-align:center; padding:24px; position:relative; overflow-y:auto;
}
.celebrate h1{ font-size:30px; color:var(--yellow); margin:16px 0 8px; }
.celebrate .reward-row{ display:flex; gap:14px; margin:20px 0; }
.reward-box{
  background:#fff; border:2px solid var(--gray); border-bottom-width:4px;
  border-radius:16px; padding:14px 20px; min-width:96px;
}
.reward-box .rv{ font-size:26px; font-weight:800; }
.reward-box.xp{ color:var(--yellow); } .reward-box.xp{ border-color:#ffe699; }
.reward-box.streak{ color:var(--red); border-color:#ffc2c2; }
.medal-pop{ display:flex; align-items:center; gap:12px; background:#fffbe6; border:2px solid #ffe699;
  border-radius:14px; padding:10px 14px; margin-bottom:8px; }

/* grade de medalhas (perfil) */
.medal-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.medal{ background:#fff; border:2px solid var(--gray); border-radius:14px; padding:12px 6px; text-align:center; }
.medal.locked{ opacity:.45; filter:grayscale(1); }
.medal .mi{ font-size:30px; }
.medal .mt{ font-size:11px; font-weight:700; margin-top:4px; line-height:1.2; }

/* ---------- 5. PAINEL DO PROFESSOR ---------- */
.teacher-tabs{ display:flex; border-bottom:2px solid var(--gray); background:#fff; }
.teacher-tab{
  flex:1; padding:14px 4px; text-align:center; font-weight:700; font-size:13px;
  border:none; background:none; color:var(--gray-d); cursor:pointer; border-bottom:3px solid transparent;
}
.teacher-tab.active{ color:var(--blue); border-bottom-color:var(--blue); }
.t-lesson-row{
  display:flex; align-items:center; gap:10px; background:#fff;
  border:2px solid var(--gray); border-radius:12px; padding:12px; margin-bottom:10px;
}
.t-lesson-row .info{ flex:1; min-width:0; }
.t-lesson-row .info .t{ font-weight:800; }
.t-lesson-row .info .d{ font-size:12px; color:var(--gray-d); }
.icon-btn{
  width:40px; height:40px; border:none; border-radius:10px; background:#f0f0f0;
  font-size:18px; cursor:pointer; flex-shrink:0;
}
.icon-btn:active{ background:var(--gray); }
.ex-edit-card{
  background:#f7f7f7; border:2px solid var(--gray); border-radius:14px; padding:14px; margin-bottom:14px;
}
.opt-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.opt-row input[type=text]{ margin-bottom:0; }
.opt-row .pick{ flex-shrink:0; width:40px; height:40px; }
.pill-tag{ display:inline-block; background:var(--blue); color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.prog-bar-mini{ height:12px; background:var(--gray); border-radius:8px; overflow:hidden; margin-top:6px; }
.prog-bar-mini > div{ height:100%; border-radius:8px; }

.empty{ text-align:center; color:var(--gray-d); padding:40px 20px; }
.empty .em{ font-size:48px; }

/* Painel de geração por IA */
.ia-panel{ background:#f6effc; border:2px solid #e3d1f5; border-radius:16px; padding:14px; margin:14px 0; }
.ia-head{ display:flex; align-items:center; justify-content:space-between; }
.ia-head b{ font-size:15px; color:#7d3c98; }
.ia-erro{ background:#ffdfe0; color:#c0392b; border-radius:10px; padding:10px 12px; font-size:13px; font-weight:600; margin-bottom:10px; }
.ia-loading{ display:flex; align-items:center; justify-content:center; gap:10px; font-weight:800; color:#7d3c98; padding:14px 0; font-size:16px; }
.ia-spinner{ width:22px; height:22px; border:3px solid #e3d1f5; border-top-color:#9b59b6; border-radius:50%; display:inline-block; animation:spin .8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* Tela de estudo (resumo por IA) */
.read-track{ height:6px; background:var(--gray); width:100%; }
.read-fill{ height:100%; width:0; transition:width .1s linear; }
.resumo-box{ background:#fff; border:2px solid var(--gray); border-radius:16px; padding:16px; font-size:17px; }
.resumo-topico{ display:flex; align-items:flex-start; gap:10px; background:#fffef6; border-radius:10px; padding:8px 10px; margin:6px 0; line-height:1.5; }
.resumo-topico .rt-ic{ flex-shrink:0; font-size:18px; }

/* Tela de explicação do erro */
.explic-resp{ background:#d7ffb8; border:2px solid var(--green); border-radius:12px; padding:12px; text-align:center; margin-bottom:14px; color:var(--green-d); }
.explic-resp b{ color:var(--green-d); }

/* divisor seção professor */
.sec-title{ font-size:13px; font-weight:800; color:var(--gray-d); text-transform:uppercase; margin:18px 0 8px; letter-spacing:.5px; }

/* ---------- 6. CONFETE ---------- */
.confetti{ position:absolute; top:-20px; width:10px; height:16px; opacity:.9; animation:fall linear forwards; z-index:5; }

/* ---------- 7. MASCOTE ---------- */
.mascot{ width:120px; height:120px; }
.mascot.bounce{ animation:bounce 1s infinite; }
.mascot-sm{ width:60px; height:60px; }

/* badge flutuante (toast) */
.toast{
  position:fixed; left:50%; transform:translateX(-50%); bottom:30px;
  background:#3c3c3c; color:#fff; padding:12px 20px; border-radius:30px;
  font-weight:700; font-size:14px; z-index:200; opacity:0; transition:opacity .3s, transform .3s;
  pointer-events:none; max-width:90%; text-align:center;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

/* modal senha */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100;
  display:none; align-items:center; justify-content:center; padding:24px;
}
.modal-overlay.show{ display:flex; }
.modal{
  background:#fff; border-radius:20px; padding:24px; width:100%; max-width:380px; animation:popIn .3s ease;
}
.modal h3{ margin-bottom:14px; text-align:center; }

/* ---------- 8. ANIMAÇÕES ---------- */
@keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
@keyframes popIn{ from{opacity:0; transform:scale(.85);} to{opacity:1; transform:scale(1);} }
@keyframes bounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
@keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:0; } }
@keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
.shake{ animation:shake .4s; }
@keyframes pop{ 0%{transform:scale(.6);opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
.pop{ animation:pop .4s; }
</style>
</head>
<body>
<div id="app"><!-- telas injetadas via JS --></div>
<div class="toast" id="toast"></div>

<!-- Firebase (módulos compat via CDN — sem bundler/import) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   ESTUDAMAIS — JavaScript
   Seções:
   A) DADOS (disciplinas, conteúdo inicial, storage)
   B) ESTADO & UTILITÁRIOS
   C) GAMIFICAÇÃO (XP, vidas, streak, níveis)
   D) UI DO ALUNO (home, lições, conteúdo, exercícios, celebração)
   E) UI DO PROFESSOR (login, lições, exercícios, progresso)
   F) INICIALIZAÇÃO
   ============================================================ */
(function(){
"use strict";

/* ============================================================
   A) DADOS
   ============================================================ */
// Senhas-barreira (não são segurança real; só evitam acesso casual).
const ADMIN_PASSWORD = "admin123";      // abre o painel de Admin (chave da OpenAI)
// As LIÇÕES, ALUNOS, PROFESSORES e a CONFIG ficam no Firebase Firestore.
// O localStorage guarda apenas a sessão local e um cache do aluno deste aparelho.
const SESSAO_KEY = "estudamais_sessao_v2";   // { tipo:"aluno"|"professor", id }
const ALUNO_CACHE_KEY = "estudamais_aluno_cache_v2"; // cache do doc do aluno logado (offline)
const IA_MODO_KEY = "estudamais_ia_modo_v1"; // preferência local: substituir | acumular
const SEED_FLAG = "estudamais_seed_firestore"; // marca que já semeamos os exemplos neste navegador

// ----- Níveis de ensino e anos (Fund. I, Fund. II, Médio) -----
const NIVEIS_ENSINO = [
  { id:"fund1", nome:"Ensino Fundamental I",  anos:["1º ano","2º ano","3º ano","4º ano","5º ano"] },
  { id:"fund2", nome:"Ensino Fundamental II", anos:["6º ano","7º ano","8º ano","9º ano"] },
  { id:"medio", nome:"Ensino Médio",          anos:["1º ano EM","2º ano EM","3º ano EM"] },
];
function nivelById(id){ return NIVEIS_ENSINO.find(n=>n.id===id) || NIVEIS_ENSINO[0]; }
function nomeNivel(id){ return nivelById(id).nome; }

// Turmas padronizadas como LETRA ÚNICA (A–F), iguais no aluno e no professor,
// para a comparação de escopo (licaoVisivelPara) sempre casar.
const TURMAS_LETRAS = ["A","B","C","D","E","F"];
function turmaSelectHtml(id, sel, incluirVazio){
  const vazio = incluirVazio ? `<option value="" ${!sel?'selected':''}>Selecione a turma</option>` : "";
  return `<select id="${id}">${vazio}${TURMAS_LETRAS.map(t=>`<option value="${t}" ${t===sel?'selected':''}>Turma ${t}</option>`).join("")}</select>`;
}

// Estima a idade típica a partir do nível/ano (Fund. I começa aos ~6 anos).
function idadeAproximada(nivelId, ano){
  const n = nivelById(nivelId);
  const base = ({ fund1:6, fund2:11, medio:15 })[n.id] || 10;
  const i = n.anos.indexOf(ano);
  return base + (i>=0 ? i : 0);
}
// Frase de adaptação enviada à IA (linguagem/complexidade por faixa etária).
function fraseAdaptacao(nivelId, ano, idade){
  return `Adapte a linguagem e a complexidade para um aluno do ${ano} do ${nomeNivel(nivelId)}, com aproximadamente ${idade} anos.`;
}
// Descreve a faixa etária do ALUNO logado para adaptar a linguagem da IA.
function descreverPublico(aluno){
  const a = aluno || ALUNO || {};
  const nivelId = a.nivel || "fund1";
  const ano = a.ano || nivelById(nivelId).anos[0];
  const idade = a.idade ? a.idade : idadeAproximada(nivelId, ano);
  return { ano, nivel:nomeNivel(nivelId), idade, frase:fraseAdaptacao(nivelId, ano, idade) };
}
// Descreve a faixa etária ALVO de uma lição (usada na geração pelo professor).
function descreverPublicoLicao(L){
  const nivelId = (L && L.nivel) || "fund1";
  const ano = (L && L.ano) || nivelById(nivelId).anos[0];
  const idade = idadeAproximada(nivelId, ano);
  return { ano, nivelId, idade, frase:fraseAdaptacao(nivelId, ano, idade) };
}

// ----- Firebase / Firestore -----
// Config do Firebase é pública por natureza (a segurança vem das Regras do Firestore).
const firebaseConfig = {
  apiKey: "AIzaSyDE5ikPdDSc0-olqnSlV1F1uKiOV-TCofk",
  authDomain: "estudamais-5cb1b.firebaseapp.com",
  projectId: "estudamais-5cb1b",
  storageBucket: "estudamais-5cb1b.firebasestorage.app",
  messagingSenderId: "638423075835",
  appId: "1:638423075835:web:9d1cbf3be714fa20a2595e",
  measurementId: "G-1K93EM8LZ9"
};
let db = null;
function initFirebase(){
  if(typeof firebase === "undefined") throw new Error("Firebase não carregou (sem conexão?).");
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  // cache offline (best-effort; não bloqueia se falhar)
  try{ db.enablePersistence({ synchronizeTabs:true }).catch(function(){}); }catch(e){}
}

// ----- Configuração da IA: OpenAI GPT-4o-mini -----
// A chave é compartilhada via Firestore: coleção "config", documento "openai",
// campo "apiKey", cadastrada pelo professor no painel de Admin. Carregada uma única
// vez no boot (carregarChaveIA) e mantida em memória na variável global IA.apiKey.
const IA_MODELO = "gpt-4o-mini";
const IA_ENDPOINT = "https://api.openai.com/v1/chat/completions";
let IA = { apiKey:"", modo:"substituir" }; // apiKey em memória; modo: substituir | acumular
function loadIA(){
  // modo de geração é uma preferência local (não precisa ir à nuvem)
  try{ const m=localStorage.getItem(IA_MODO_KEY); if(m==="substituir"||m==="acumular") IA.modo=m; }catch(e){}
}
function saveIaModo(){ try{ localStorage.setItem(IA_MODO_KEY, IA.modo); }catch(e){} }

// Lê a chave da OpenAI do Firestore (config/openai.apiKey) e guarda em IA.apiKey.
// Best-effort: sem rede/permissão, segue sem chave (cai no fallback nas telas).
async function carregarChaveIA(){
  if(!db) return;
  try{
    const doc = await db.collection("config").doc("openai").get();
    if(doc.exists){ const d=doc.data()||{}; if(d.apiKey){ IA.apiKey = String(d.apiKey).trim(); return; } }
    // compatibilidade com a versão anterior (config/app.openaiApiKey)
    const legado = await db.collection("config").doc("app").get();
    if(legado.exists){ const d=legado.data()||{}; if(d.openaiApiKey) IA.apiKey = String(d.openaiApiKey).trim(); }
  }catch(e){ /* sem permissão/rede: segue sem chave compartilhada */ }
}

// ----- Hash simples de senha (SHA-256, client-only) -----
// Barreira, não segurança real: protege contra leitura casual da senha em claro.
async function hashSenha(senha){
  const txt = String(senha==null?"":senha);
  try{
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){
    // fallback simples caso SubtleCrypto não esteja disponível (ex.: file:// em navegador antigo)
    let h=0; for(let i=0;i<txt.length;i++){ h=((h<<5)-h+txt.charCodeAt(i))|0; }
    return "f"+(h>>>0).toString(16);
  }
}

// resumoIA / explicacoes guardam o conteúdo gerado pela IA para ser compartilhado entre dispositivos.
function licaoDeDoc(id, d){
  return {
    id,
    titulo:d.titulo||"",

    exercicios:Array.isArray(d.exercicios)?d.exercicios:[],

    // escopo (Fase B): turma e ano/nível a que a lição se destina ("" = todas)
    turma: d.turma||"",
    ano: d.ano||"",
    nivel: d.nivel||""
  };
}
function removeLicaoLocal(id){ SUBJECTS.forEach(s=>{ DATA[s.id]=(DATA[s.id]||[]).filter(l=>l.id!==id); }); }

let licoesUnsub = null;

// Reconstrói DATA (agrupado por disciplina) a partir de um snapshot do Firestore.
function construirDATA(snap){
  SUBJECTS.forEach(s=> DATA[s.id]=[]);
  const docs=[];
  snap.forEach(doc=> docs.push({ id:doc.id, d:doc.data() }));
  // ordena por criadoEm (mais antigo primeiro), tolerando ausência
  docs.sort((a,b)=> ((a.d.criadoEm&&a.d.criadoEm.seconds)||0) - ((b.d.criadoEm&&b.d.criadoEm.seconds)||0));
  docs.forEach(({id,d})=>{
    const disc = d.disciplina;
    if(!DATA[disc]) DATA[disc]=[]; // disciplina fora da lista padrão também é aceita
    DATA[disc].push(licaoDeDoc(id, d));
  });
  return docs.length;
}

// Listener em tempo real: qualquer mudança nas lições (deste ou de outro dispositivo)
// atualiza DATA e re-renderiza. A Promise resolve no primeiro snapshot (para o boot).
function ouvirLicoes(){
  if(licoesUnsub){ try{ licoesUnsub(); }catch(e){} licoesUnsub=null; }
  return new Promise((resolve, reject)=>{
    let primeiro=true;
    licoesUnsub = db.collection("licoes").onSnapshot(async snap=>{
      const total = construirDATA(snap);
      if(primeiro){
        primeiro=false;
        // primeira execução com banco vazio → semeia os exemplos uma vez
        if(total===0 && !localStorage.getItem(SEED_FLAG)){
          try{ await seedFirestore(); }catch(e){}
        }
        try{ localStorage.setItem(SEED_FLAG, "1"); }catch(e){}
        resolve();
      } else {
        aoAtualizarLicoes(); // atualização vinda do servidor (outro dispositivo, etc.)
      }
    }, err=>{
      if(primeiro){ primeiro=false; reject(err); }
    });
  });
}

// Re-renderiza ao receber atualização do servidor, sem atrapalhar o aluno/professor no meio de algo.
function aoAtualizarLicoes(){
  const t=State.tela;
  const seguro = t==="home" || t==="lessons" || t==="profile" ||
                 (t==="teacher" && Teacher.tab!=="novo" && !Teacher.gerando);
  if(seguro) render();
}

// Semeia o Firestore com as lições de exemplo (uma única vez).
async function seedFirestore(){
  const seed = seedData();
  for(const sid of Object.keys(seed)){
    for(const licao of seed[sid]){
      const ref = await db.collection("licoes").add({
        disciplina: sid,
        titulo: licao.titulo,
        conteudo: licao.texto,
        exercicios: licao.exercicios,
        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      if(!DATA[sid]) DATA[sid]=[];
      DATA[sid].push({ id:ref.id, titulo:licao.titulo, texto:licao.texto, exercicios:licao.exercicios });
    }
  }
}

// Garante que um doc de aluno tenha todos os campos esperados (compatibilidade).
function normalizarAluno(a){
  a = a || {};
  if(typeof a.xpTotal!=="number") a.xpTotal=0;
  if(typeof a.streak!=="number") a.streak=0;
  if(!("ultimoDia" in a)) a.ultimoDia=null;
  if(!Array.isArray(a.medalhas)) a.medalhas=[];
  if(!Array.isArray(a.premiacoes)) a.premiacoes=[];
  if(!a.premiacoesInfo || typeof a.premiacoesInfo!=="object") a.premiacoesInfo={};
  if(typeof a.som!=="boolean") a.som=true;
  if(!a.disciplinas || typeof a.disciplinas!=="object") a.disciplinas={};
  SUBJECTS.forEach(s=>{ if(!a.disciplinas[s.id]) a.disciplinas[s.id]={xp:0,nivel:1,licoesConcluidas:[]}; });
  if(!Array.isArray(a.licoesConcluidas)) a.licoesConcluidas=[];
  if(!a.nome) a.nome="Aluno(a)";
  if(!a.nivel) a.nivel="fund1";
  if(!a.ano) a.ano="5º ano";
  if(!a.turma) a.turma="A";
  return a;
}

// Persiste o progresso do aluno: cache local (offline) + write-through no Firestore.
function saveProfile(){
  if(!ALUNO) return;
  // espelho plano de licoesConcluidas (união das disciplinas) — atende o spec/consultas
  const flat=[];
  SUBJECTS.forEach(s=>{ const d=ALUNO.disciplinas[s.id]; if(d) d.licoesConcluidas.forEach(id=>{ if(flat.indexOf(id)<0) flat.push(id); }); });
  ALUNO.licoesConcluidas = flat;
  try{ localStorage.setItem(ALUNO_CACHE_KEY, JSON.stringify({ id:ALUNO.id, doc:ALUNO })); }catch(e){}
  if(db && ALUNO.id){
    const payload = Object.assign({}, ALUNO); delete payload.id;
    try{ db.collection("alunos").doc(ALUNO.id).set(payload, { merge:true }); }catch(e){}
  }
}

// Módulo de ÁUDIO — gera sons via Web Audio API (sem arquivos, funciona offline)
const Sound = {
  ctx:null,
  init(){ // o AudioContext só pode iniciar após um toque do usuário
    if(this.ctx) return;
    try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ this.ctx=null; }
  },
  // toca uma nota: freq (Hz), início (s a partir de agora), duração (s), forma de onda, volume
  tone(freq, delay, dur, type, vol){
    if(!this.ctx) return;
    const t0 = this.ctx.currentTime + (delay||0);
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = type||"sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  },
  play(notes){ // notes: [ [freq, delay, dur, type?, vol?], ... ]
    if(!(PROFILE && PROFILE.som)) return;
    if(this.ctx && this.ctx.state==="suspended") this.ctx.resume();
    notes.forEach(n=>this.tone(n[0],n[1],n[2],n[3],n[4]));
  },
  correct(){ this.play([[660,0,.12,"triangle",.25],[880,.10,.18,"triangle",.25]]); },
  wrong(){ this.play([[200,0,.18,"sawtooth",.18],[150,.16,.22,"sawtooth",.18]]); },
  level(){ this.play([[523,0,.12,"square",.2],[659,.12,.12,"square",.2],[784,.24,.12,"square",.2],[1047,.36,.25,"square",.22]]); },
  celebrate(){ this.play([[523,0,.14,"triangle",.25],[659,.14,.14,"triangle",.25],[784,.28,.14,"triangle",.25],[1047,.42,.3,"triangle",.28]]); },
  unlock(){ this.play([[784,0,.1,"sine",.22],[1047,.1,.1,"sine",.22],[1319,.2,.22,"sine",.24]]); },
  click(){ this.play([[440,0,.05,"sine",.12]]); }
};

// Módulo de LEITURA EM VOZ ALTA (TTS) — Web Speech API, sem arquivos, offline.
const Fala = {
  ok(){ return typeof window!=="undefined" && "speechSynthesis" in window && typeof SpeechSynthesisUtterance!=="undefined"; },
  ler(texto){
    if(!this.ok() || !texto) return;
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(String(texto).slice(0,4000));
      u.lang="pt-BR"; u.rate=0.95; u.pitch=1;
      window.speechSynthesis.speak(u);
    }catch(e){}
  },
  parar(){ if(this.ok()){ try{ window.speechSynthesis.cancel(); }catch(e){} } },
  falando(){ try{ return this.ok() && window.speechSynthesis.speaking; }catch(e){ return false; } }
};
// Botão reutilizável de "ouvir" (só aparece se o navegador suporta TTS).
function botaoFala(handler, rotulo){
  if(!Fala.ok()) return "";
  return `<button class="btn gray small" style="width:auto" onclick="App.${handler}()">🔊 ${esc(rotulo||'Ouvir')}</button>`;
}
function toggleLeitura(texto){ if(Fala.falando()) Fala.parar(); else Fala.ler(texto); }
function lerResumo(){ toggleLeitura((State.estudo && State.estudo.texto) || ""); }

}

const XP_POR_NIVEL = 50;       // XP necessário por nível em cada disciplina
const XP_POR_ACERTO = 10;      // XP padrão (questões antigas, sem dificuldade)
const XP_BONUS_LICAO = 20;     // bônus ao concluir lição
// XP por acerto conforme a dificuldade da questão (item 6)
const XP_POR_DIFICULDADE = { facil:10, intermediario:20, dificil:30 };
function xpDaQuestao(ex){ return (ex && XP_POR_DIFICULDADE[ex.nivel]) || XP_POR_ACERTO; }
// Ordem crescente de dificuldade (questões sem nível ficam no meio, ordem estável)
const ORDEM_NIVEL = { facil:0, intermediario:1, dificil:2 };
function ordenarPorDificuldade(arr){
  return arr.map((ex,i)=>({ex,i})).sort((a,b)=>{
    const na = ORDEM_NIVEL[a.ex.nivel]!==undefined ? ORDEM_NIVEL[a.ex.nivel] : 1;
    const nb = ORDEM_NIVEL[b.ex.nivel]!==undefined ? ORDEM_NIVEL[b.ex.nivel] : 1;
    return na-nb || a.i-b.i;
  }).map(o=>o.ex);
}
function nivelDificuldadeLabel(n){ return n==="facil"?"Fácil":(n==="intermediario"?"Intermediário":(n==="dificil"?"Difícil":"")); }
function nivelDificuldadeCor(n){ return n==="facil"?"#58cc02":(n==="intermediario"?"#ffa502":(n==="dificil"?"#ff4b4b":"#afafaf")); }

function nivelDe(xp){ return Math.floor(xp / XP_POR_NIVEL) + 1; }
function xpNoNivel(xp){ return xp % XP_POR_NIVEL; }

// Atualiza streak diário com base na data
function atualizarStreak(){
  const hoje = new Date().toDateString();
  if(PROFILE.ultimoDia === hoje) return; // já contado hoje
  const ontem = new Date(Date.now()-86400000).toDateString();
  if(PROFILE.ultimoDia === ontem) PROFILE.streak += 1;
  else PROFILE.streak = 1;
  PROFILE.ultimoDia = hoje;
  saveProfile();
}

// Concede recompensas ao concluir uma lição (xpAcertos = soma do XP por dificuldade)
function concederRecompensa(subjId, lessonId, xpAcertos){
  const d = PROFILE.disciplinas[subjId];
  const ganho = xpAcertos + XP_BONUS_LICAO;
  const nivelAntes = nivelDe(d.xp);
  d.xp += ganho;
  PROFILE.xpTotal += ganho;
  if(d.licoesConcluidas.indexOf(lessonId)<0) d.licoesConcluidas.push(lessonId);
  d.nivel = nivelDe(d.xp);
  atualizarStreak();
  saveProfile();
  return { ganho, subiuNivel: nivelDe(d.xp)>nivelAntes, nivel:d.nivel };
}

// Estatísticas agregadas do progresso (usadas pelas medalhas e telas)
function statsProgresso(){
  let totalConcl=0, discComConcl=0, nivelMax=1;
  SUBJECTS.forEach(s=>{
    const d=PROFILE.disciplinas[s.id];
    const vis=licoesDoAluno(s.id);

    totalConcl+=f; if(f>0) discComConcl++; if(d.nivel>nivelMax) nivelMax=d.nivel;
  });
  return { totalConcl, discComConcl, nivelMax };
}

// Verifica e desbloqueia novas medalhas. ctx={perfeito:bool}. Retorna as recém-conquistadas.
function verificarMedalhas(ctx){
  ctx=ctx||{}; const s=statsProgresso(); const novas=[];
  ACHIEVEMENTS.forEach(a=>{
    if(PROFILE.medalhas.indexOf(a.id)>=0) return;
    if(a.check(PROFILE, s, ctx)){ PROFILE.medalhas.push(a.id); novas.push(a); }
  });
  if(novas.length) saveProfile();
  return novas;
}

// --- PREMIAÇÕES PERSONALIZADAS (cadastradas pelo professor) ---
let PREMIACOES = []; // premiações disponíveis carregadas do Firestore para o aluno
async function carregarPremiacoes(){
  PREMIACOES = [];
  if(!db || !ALUNO) return;
  try{
    const snap = await db.collection("premiacoes").get();
    snap.forEach(d=> PREMIACOES.push(Object.assign({ id:d.id }, d.data())));
  }catch(e){ PREMIACOES=[]; }
}
function agoraSeg(){ return Math.floor(Date.now()/1000); }
function premiacaoAplicavel(pr){
  if(pr.turma && pr.turma!==ALUNO.turma) return false;
  if(pr.expiracaoEm && pr.expiracaoEm.seconds && pr.expiracaoEm.seconds < agoraSeg()) return false;
  return true;
}
function premiacaoAtingida(pr, ctx){
  const v = Number(pr.valorMinimo)||0;
  if(pr.criterio==="pontuacao")  return (ALUNO.xpTotal||0) >= v;
  if(pr.criterio==="atividades") return (ALUNO.licoesConcluidas||[]).length >= v;
  if(pr.criterio==="acertos")    return ctx && ctx.pctAcertos!=null && ctx.pctAcertos >= v;
  return false;
}
// Avalia as premiações e concede as recém-atingidas (grava em premiacoes_alunos).
async function avaliarPremiacoes(ctx){
  if(!db || !ALUNO || !PREMIACOES.length) return [];
  ALUNO.premiacoes = ALUNO.premiacoes||[];
  ALUNO.premiacoesInfo = ALUNO.premiacoesInfo||{};
  const novas=[];
  for(const pr of PREMIACOES){
    if(ALUNO.premiacoes.indexOf(pr.id)>=0) continue;
    if(!premiacaoAplicavel(pr)) continue;
    if(!premiacaoAtingida(pr, ctx)) continue;
    ALUNO.premiacoes.push(pr.id);
    ALUNO.premiacoesInfo[pr.id] = { nome:pr.nome||"Prêmio", icone:pr.icone||"🏆", descricao:pr.descricao||"" };
    novas.push(pr);
    try{ await db.collection("premiacoes_alunos").doc(ALUNO.id+"_"+pr.id).set({
      alunoId:ALUNO.id, premiacaoId:pr.id, conquistadoEm:firebase.firestore.FieldValue.serverTimestamp() }); }catch(e){}
  }
  if(novas.length) saveProfile();
  return novas;
}
// Carrega e avalia premiações ao entrar (premia por XP/atividades acumulados).
function inicializarAluno(){
  carregarPremiacoes().then(()=> avaliarPremiacoes({}).then(novas=>{
    if(novas && novas.length){ novas.forEach(p=>toast(`🏆 ${p.nome}!`)); if(State.tela==="home"||State.tela==="profile") render(); }
  }));
}

// Busca alunos por nome de forma tolerante (ignora maiúsculas/acentos/espaços).
async function buscarAlunosPorNome(nomeInput){
  const alvo = norm(nomeInput);
  let snap = await db.collection("alunos").where("nomeNorm","==",alvo).get();       // contas novas/migradas
  if(!snap.empty) return snap.docs;
  snap = await db.collection("alunos").where("nome","==",(nomeInput||"").trim()).get(); // legado (nome exato)
  if(!snap.empty) return snap.docs;
  const all = await db.collection("alunos").get();                                  // legado tolerante (varredura)
  return all.docs.filter(d=> norm((d.data()||{}).nome)===alvo);
}
async function submitLoginAluno(){
  const nome=val('laNome').trim(), senha=val('laSenha');
  if(!nome||!senha){ State.authErro="Informe nome e senha."; render(); return; }
  State.authBusy=true; State.authErro=""; render();
  try{
    const docs = await buscarAlunosPorNome(nome);
    if(!docs.length) throw new Error("nao_encontrado");
    const h = await hashSenha(senha);
    let achou=null;
    docs.forEach(d=>{ if(!achou && d.data().senha===h) achou={ id:d.id, data:d.data() }; });
    if(!achou) throw new Error("senha");
    // backfill do campo normalizado em contas antigas (acelera logins futuros)
    if(!achou.data.nomeNorm){ try{ db.collection("alunos").doc(achou.id).set({ nomeNorm:norm(achou.data.nome||"") }, { merge:true }); }catch(_){} }
    const doc = Object.assign({}, achou.data, { id:achou.id }); delete doc.criadoEm;
    definirAlunoLogado(doc);
    SESSAO={ tipo:"aluno", id:achou.id }; salvarSessao();
    State.authBusy=false; State.tela="home"; render(); inicializarAluno();
  }catch(e){
    State.authBusy=false;
    State.authErro = e.message==="nao_encontrado" ? "Aluno não encontrado." : (e.message==="senha" ? "Senha incorreta." : "Erro ao entrar. Verifique a conexão.");
    render();
  }
}

// ----- Escopo de lições: o aluno só vê as da sua turma/ano/nível -----
// Campos vazios na lição significam "todas" (ex.: conteúdo de exemplo).
function licaoVisivelPara(l, aluno){
  const okTurma = !l.turma || l.turma===aluno.turma;
  const okAno   = !l.ano   || l.ano===aluno.ano;
  const okNivel = !l.nivel || l.nivel===aluno.nivel;
  return okTurma && okAno && okNivel;
}
function licaoVisivel(l){ return ALUNO ? licaoVisivelPara(l, ALUNO) : true; }
// Diagnóstico: por que uma lição está oculta para o aluno (campos que não casam).
function motivoOculta(l){
  if(!ALUNO) return "";
  const m=[];
  if(l.turma && l.turma!==ALUNO.turma) m.push(`turma "${l.turma}" ≠ sua "${ALUNO.turma||'?'}"`);
  if(l.ano   && l.ano!==ALUNO.ano)     m.push(`ano "${l.ano}" ≠ seu "${ALUNO.ano||'?'}"`);
  if(l.nivel && l.nivel!==ALUNO.nivel) m.push(`nível "${nomeNivel(l.nivel)}" ≠ seu "${nomeNivel(ALUNO.nivel)}"`);
  return m.join("; ");
}
function licoesDoAluno(subjId){ return (DATA[subjId]||[]).filter(licaoVisivel); }

// ----- Cache compartilhado de conteúdo gerado por IA (coleção "licoes_geradas") -----
// Guarda { licaoId, resumo, exercicios, geradoEm, geradoPor } para reuso entre dispositivos.
function deviceId(){
  let id=null; try{ id=localStorage.getItem("estudamais_device"); }catch(e){}
  if(!id){ id="dev"+Math.random().toString(36).slice(2,10); try{ localStorage.setItem("estudamais_device", id); }catch(e){} }
  return id;
}
async function getLicaoGerada(licaoId){
  if(!db || !licaoId) return null;
  try{ const d=await db.collection("licoes_geradas").doc(licaoId).get(); return d.exists ? d.data() : null; }
  catch(e){ return null; }
}
function salvarLicaoGerada(licaoId, dados){
  if(!db || !licaoId) return;
  try{
    db.collection("licoes_geradas").doc(licaoId).set(Object.assign({
      licaoId, geradoEm: firebase.firestore.FieldValue.serverTimestamp(), geradoPor: deviceId()
    }, dados), { merge:true });
  }catch(e){ /* best-effort */ }
}
function limparLicaoGerada(licaoId){
  if(!db || !licaoId) return;
  try{ db.collection("licoes_geradas").doc(licaoId).delete(); }catch(e){}
}

// ----- TELA DE ESTUDO (resumo gerado por IA, antes das atividades) -----
function getLesson(){ return (DATA[State.subj]||[]).find(l=>l.id===State.lesson); }

async function openLesson(lid){
  clearInterval(estudoTimer);
  State.lesson=lid; State.tela="study";
  const l=getLesson();
  if(!l){ goHome(); return; }

  // pré-gera as explicações de erro em segundo plano (só em aparelho com a chave),
  // para que qualquer dispositivo já encontre a explicação pronta no Firestore
  if(IA.apiKey.trim()) pregerarExplicacoes(l);

  // 1) cache em memória desta sessão
  if(resumoCache[lid]){ State.estudo={ status:"ok", texto:resumoCache[lid] }; render(); return; }

  // mostra a tela de carregamento enquanto consultamos o cache na nuvem
  State.estudo={ status:"loading" }; render();
  const ativo=()=> State.tela==="study" && State.lesson===lid;

  // 2) cache compartilhado no Firestore (licoes_geradas) → reaproveita sem chamar a IA
  const cache = await getLicaoGerada(lid);
  if(cache && cache.resumo && String(cache.resumo).trim()){
    resumoCache[lid]=cache.resumo;
    if(ativo()){ State.estudo={ status:"ok", texto:cache.resumo }; render(); }
    return;
  }
  // 2b) legado: resumo salvo no próprio doc da lição → usa e migra para o novo cache
  if(l.resumoIA && l.resumoIA.trim()){
    resumoCache[lid]=l.resumoIA;
    salvarLicaoGerada(lid, { resumo:l.resumoIA, exercicios:l.exercicios });
    if(ativo()){ State.estudo={ status:"ok", texto:l.resumoIA }; render(); }
    return;
  }
  // 3) sem chave neste aparelho → usa o conteúdo original do professor
  if(!IA.apiKey.trim()){ if(ativo()){ State.estudo={ status:"fallback", texto:l.texto }; render(); } return; }

  // 4) gera o resumo pela IA e salva no cache compartilhado (licoes_geradas)
  const pub = descreverPublico(ALUNO);
  const prompt =
`Você é um professor do ${pub.ano} do ${pub.nivel}.
Com base no conteúdo abaixo, crie um resumo didático e detalhado para o aluno estudar antes de responder exercícios.
O resumo deve:
- Ter linguagem clara e animada
- Usar exemplos do cotidiano adequados à faixa etária
- Destacar os pontos mais importantes em tópicos
- Ter no máximo 300 palavras
- Incluir uma dica de memorização no final
${pub.frase}
Conteúdo da lição: ${l.texto}`;
  try{
    const texto = await chamarIA(prompt, 20000);
    if(!texto.trim()) throw new Error("vazio");
    resumoCache[lid]=texto;
    salvarLicaoGerada(lid, { resumo:texto, exercicios:l.exercicios });
    if(ativo()){ State.estudo={ status:"ok", texto }; render(); }
  }catch(e){
    if(ativo()){ State.estudo={ status:"fallback", texto:l.texto }; render(); }
  }
}

// barra de progresso de leitura + contagem regressiva de 10s do botão
function setupEstudoScreen(btnLabel, cor){
  const cont=document.getElementById("estudoContent");
  const bar=document.getElementById("estudoProg");
  if(cont && bar){
    const upd=()=>{ const max=cont.scrollHeight-cont.clientHeight; bar.style.width=(max>4?(cont.scrollTop/max*100):100)+"%"; };
    cont.addEventListener("scroll", upd); upd();
  }
  const btn=document.getElementById("btnEstudei");
  const cnt=document.getElementById("estudoCount");
  let restante=10;
  clearInterval(estudoTimer);
  estudoTimer=setInterval(()=>{
    restante--;
    if(restante<=0){
      clearInterval(estudoTimer);
      if(btn){ btn.disabled=false; btn.innerHTML="✅ "+btnLabel; }
    } else if(cnt){ cnt.textContent=restante; }
  },1000);
}

// transforma o texto do resumo em HTML, destacando tópicos com ⭐
function formatResumo(txt){
  return String(txt||"").split("\n").map(raw=>{
    const t=raw.trim();
    if(!t) return `<div style="height:8px"></div>`;
    const m=t.match(/^[-•*]\s+(.*)$/);
    if(m) return `<div class="resumo-topico"><span class="rt-ic">⭐</span><span>${esc(m[1])}</span></div>`;
    return `<p style="margin:8px 0;line-height:1.6">${esc(t)}</p>`;
  }).join("");
}

// ----- EXERCÍCIOS -----
function startExercises(){
  clearInterval(estudoTimer);
  Sound.init(); // habilita áudio após o toque do usuário
  const l=getLesson();
  if(!l || l.exercicios.length===0){ openSubject(State.subj); return; }
  // resolve em ordem crescente de dificuldade (fácil → intermediário → difícil)
  const ordenados = ordenarPorDificuldade(l.exercicios);
  Sess = { idx:0, vidas:3, acertos:0, erros:0, xpGanho:0, respondido:false, acertouAtual:false,
           selecionado:null, respAluno:"", total:ordenados.length, exercicios:ordenados, revisao:[] };
  State.tela="exercise"; render();
}

function renderExercise(){
  const s=subjById(State.subj);
  const ex = Sess.exercicios[Sess.idx];
  const progresso = (Sess.idx / Sess.total)*100;
  const hearts = "❤️".repeat(Sess.vidas) + "🤍".repeat(3-Sess.vidas);

  let body="";
  if(ex.tipo==="fill"){
    body = `<input type="text" class="fill-input" id="fillAns" placeholder="Digite aqui..." autocomplete="off"
              ${Sess.respondido?'disabled':''} oninput="App.onFillInput()">`;
  } else {
    const opcoes = ex.opcoes||[];
    body = opcoes.map((o,i)=>{
      let cls="opt";
      if(Sess.respondido){
        if(i===ex.correta) cls+=" correct";
        else if(i===Sess.selecionado) cls+=" wrong";
      } else if(Sess.selecionado===i) cls+=" selected";
      const letra = ex.tipo==="vf" ? (i===0?'V':'F') : String.fromCharCode(65+i);
      return `<div class="${cls}" onclick="App.selectOpt(${i})">
        <span class="letter">${letra}</span><span>${esc(o)}</span></div>`;
    }).join("");
  }

  // rodapé: ou botão verificar, ou feedback
  let footer;
  if(Sess.respondido){
    const ok=Sess.acertouAtual;
    let respCorreta = ex.tipo==="fill" ? ex.resposta : (ex.opcoes? ex.opcoes[ex.correta]:"");
    if(ok){
      footer = `<div class="feedback-bar correct">
        <div class="feedback-msg">🎉 Muito bem!</div>
        <button class="btn" onclick="App.nextExercise()">Continuar</button>
      </div>`;
    } else {
      // ao errar: feedback vermelho + carregando explicação (a tela de explicação assume em seguida)
      footer = `<div class="feedback-bar wrong">
        <div class="feedback-msg">😕 Ops! Resposta certa: <span style="text-decoration:underline">${esc(respCorreta)}</span></div>
        <button class="btn red" disabled><span class="ia-spinner" style="width:18px;height:18px;border-top-color:#fff;border-color:rgba(255,255,255,.4);vertical-align:middle"></span> Gerando explicação...</button>
      </div>`;
    }
  } else {
    const dis = (ex.tipo==="fill") ? '' : (Sess.selecionado===null?'disabled':'');
    footer = `<div class="feedback-bar">
      <button class="btn" id="checkBtn" ${dis} onclick="App.checkAnswer()">Verificar</button>
    </div>`;
  }

  app.innerHTML = `<div class="screen active">
    <div class="exercise-top">
      <button class="back-btn" onclick="App.confirmQuit()">✕</button>
      <div class="progress-track"><div class="progress-fill" style="width:${progresso}%;background:${s.cor}"></div></div>
      <div class="hearts">${hearts}</div>
    </div>
    <div class="content">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-d);font-weight:700;margin-bottom:8px">
        <span>Questão ${Sess.idx+1} de ${Sess.total}</span>
        <span>✅ ${Sess.acertos} acerto${Sess.acertos===1?'':'s'}</span>
      </div>
      <div style="margin-bottom:6px;display:flex;gap:6px;align-items:center">
        <span class="pill-tag" style="background:${s.cor}">${tipoLabel(ex.tipo)}</span>
        ${ex.nivel?`<span class="pill-tag" style="background:${nivelDificuldadeCor(ex.nivel)}">${nivelDificuldadeLabel(ex.nivel)} • +${xpDaQuestao(ex)} XP</span>`:''}
      </div>
      <div class="q-prompt">${esc(ex.enunciado)}</div>
      ${Fala.ok()?`<div style="margin:-4px 0 12px">${botaoFala('lerQuestao','Ouvir a pergunta')}</div>`:''}
      <div id="optWrap">${body}</div>
    </div>
    ${footer}
  </div>`;
}
function tipoLabel(t){ return t==="mc"?"Múltipla escolha":(t==="vf"?"Verdadeiro ou Falso":"Complete a lacuna"); }

function selectOpt(i){
  if(Sess.respondido) return;
  Sess.selecionado=i; renderExercise();
}
function onFillInput(){
  const v=document.getElementById("fillAns");
  const btn=document.getElementById("checkBtn");
  if(btn) btn.disabled = !v.value.trim();
}

function checkAnswer(){
  const ex=Sess.exercicios[Sess.idx];
  let ok=false;
  if(ex.tipo==="fill"){
    const resp=document.getElementById("fillAns").value;
    if(!resp.trim()) return;
    Sess.respAluno=resp;
    ok = norm(resp)===norm(ex.resposta);
  } else {
    if(Sess.selecionado===null) return;
    Sess.respAluno = (ex.opcoes? ex.opcoes[Sess.selecionado] : "");
    ok = Sess.selecionado===ex.correta;
  }
  Sess.respondido=true; Sess.acertouAtual=ok;
  // registra para a revisão ao final da lição
  Sess.revisao.push({
    enunciado: ex.enunciado, tipo: ex.tipo, nivel: ex.nivel,
    correta: ex.tipo==="fill" ? (ex.resposta||"") : (ex.opcoes? ex.opcoes[ex.correta] : ""),
    resp: Sess.respAluno, ok: ok
  });
  if(ok){
    Sess.acertos++; Sess.xpGanho += xpDaQuestao(ex); Sound.correct(); renderExercise();
  } else {
    Sess.erros++; Sess.vidas--; Sound.wrong(); renderExercise();
    const wrap=document.getElementById("optWrap");
    if(wrap) wrap.classList.add("shake");
    // mostra o feedback vermelho por um instante e então gera a explicação por IA
    setTimeout(()=>gerarExplicacao(), 950);
  }
}

function nextExercise(){
  if(Sess.idx < Sess.total-1){
    Sess.idx++; Sess.respondido=false; Sess.acertouAtual=false; Sess.selecionado=null; Sess.respAluno="";
    // volta a tela para "exercise" (vinha de "explain"); senão a próxima geração
    // de explicação seria bloqueada pela guarda State.tela!=="exercise".
    State.tela="exercise";
    renderExercise();
  } else {
    // concluiu todos
    finishLesson();
  }
}

// ----- EXPLICAÇÃO DO ERRO (gerada por IA) -----
const IA_EXPLIC_TIMEOUT = 10000; // 10s: se a IA não responder, mostra explicação padrão
let explicacaoEmAndamento = false; // evita chamadas simultâneas à IA
async function gerarExplicacao(){
  // se o aluno saiu da atividade nesse meio tempo, não faz nada
  if(State.tela!=="exercise" || !Sess || Sess.acertouAtual) return;
  // já existe uma geração em andamento → não dispara outra (evita loop/concorrência)
  if(explicacaoEmAndamento) return;
  const l=getLesson();
  if(!l || !Sess.exercicios || !Sess.exercicios[Sess.idx]){
    mostrarExplicacao("Tudo bem errar — faz parte do aprendizado! 😊 Releia o resumo com calma e tente de novo. Você consegue! 💪", "");
    return;
  }
  const ex=Sess.exercicios[Sess.idx];
  const exId = ex.id;
  const respCorreta = ex.tipo==="fill" ? (ex.resposta||"") : (ex.opcoes? ex.opcoes[ex.correta] : "");
  const padrao = "Tudo bem errar — é assim que a gente aprende! 😊 A resposta certa é \""+respCorreta+"\". Releia o resumo com calma e tente de novo. Você consegue! 💪";
  // mensagem exibida quando a IA falha ou estoura o tempo (timeout)
  const falha = `Ops! Não consegui gerar a explicação agora. A resposta correta é "${respCorreta}". Continue praticando! 💪`;

  const myLesson=State.lesson, myIdx=Sess.idx;
  const aindaValido=()=> State.tela==="exercise" && Sess && State.lesson===myLesson && Sess.idx===myIdx && !Sess.acertouAtual;

  // 1) explicação já salva no Firestore (gerada antes, por qualquer dispositivo) → usa direto
  if(l.explicacoes && exId && l.explicacoes[exId]){
    if(aindaValido()) mostrarExplicacao(l.explicacoes[exId], respCorreta);
    return;
  }
  // 2) sem chave neste aparelho → mensagem padrão acolhedora
  if(!IA.apiKey.trim()){ if(aindaValido()) mostrarExplicacao(padrao, respCorreta); return; }

  const pub = descreverPublico(ALUNO);
  const prompt =
`Você é um professor gentil e encorajador do ${pub.ano} do ${pub.nivel}.
Um aluno de aproximadamente ${pub.idade} anos errou a seguinte questão:
Enunciado: ${ex.enunciado}
Resposta do aluno: ${Sess.respAluno||"(em branco)"}
Resposta correta: ${respCorreta}
Conteúdo da lição: ${l.texto}

Gere uma explicação curta e acolhedora que:
- Comece dizendo que tudo bem errar, faz parte do aprendizado
- Explique de forma simples por que a resposta correta é a certa
- Use um exemplo do cotidiano para ilustrar
- Termine com uma frase de incentivo
- Tenha no máximo 100 palavras
${pub.frase}`;
  explicacaoEmAndamento = true;
  try{
    const txt = await chamarIA(prompt, IA_EXPLIC_TIMEOUT);
    const final = (txt && txt.trim()) || padrao;
    // persiste a explicação no Firestore (compartilha com os outros dispositivos)
    if(txt && txt.trim() && exId){
      l.explicacoes = l.explicacoes || {};
      l.explicacoes[exId] = final;
      const upd={}; upd["explicacoes."+exId]=final;
      try{ db.collection("licoes").doc(myLesson).update(upd); }catch(_){}
    }
    if(aindaValido()) mostrarExplicacao(final, respCorreta);
  }catch(e){
    // erro de rede, 401/429 ou timeout → sempre mostra a tela de explicação (com o botão)
    if(aindaValido()) mostrarExplicacao(falha, respCorreta);
  }finally{
    explicacaoEmAndamento = false;
  }
}

function mostrarExplicacao(texto, respCorreta){
  State.explic = { texto, respCorreta };
  State.tela = "explain";
  render();
}

// Pré-gera (em segundo plano) a explicação de TODAS as questões que ainda não têm uma
// salva, e grava no Firestore. Assim qualquer dispositivo — inclusive sem a chave —
// já encontra a explicação pronta ao errar. Só roda em aparelho com a chave configurada.
let pregerando = false;
async function pregerarExplicacoes(l){
  if(pregerando || !l || !IA.apiKey.trim()) return;
  l.explicacoes = l.explicacoes || {};
  const faltando = (l.exercicios||[]).filter(ex=> ex.id && !l.explicacoes[ex.id]);
  if(!faltando.length) return;
  pregerando = true;
  const pub = descreverPublicoLicao(l);
  try{
    for(const ex of faltando){
      const respCorreta = ex.tipo==="fill" ? (ex.resposta||"") : (ex.opcoes? ex.opcoes[ex.correta] : "");
      const prompt =
`Você é um professor gentil e encorajador do ${pub.ano} do ${nomeNivel(pub.nivelId)}.
Um aluno de aproximadamente ${pub.idade} anos pode errar a seguinte questão:
Enunciado: ${ex.enunciado}
Resposta correta: ${respCorreta}
Conteúdo da lição: ${l.texto}

Gere uma explicação curta e acolhedora que:
- Comece dizendo que tudo bem errar, faz parte do aprendizado
- Explique de forma simples por que a resposta correta é a certa
- Use um exemplo do cotidiano para ilustrar
- Termine com uma frase de incentivo
- Tenha no máximo 100 palavras
${pub.frase}`;
      try{
        const txt = await chamarIA(prompt, 12000);
        const final = (txt||"").trim();
        if(final){
          l.explicacoes[ex.id] = final;
          const upd={}; upd["explicacoes."+ex.id]=final;
          try{ await db.collection("licoes").doc(l.id).update(upd); }catch(_){}
        }
      }catch(e){ /* segue para a próxima questão */ }
    }
  } finally { pregerando = false; }
}

// Grava o desempenho do aluno na lição (doc {alunoId}_{licaoId}) para o painel do professor.
async function salvarProgresso(subjId, lessonId, sess){
  if(!db || !ALUNO || !ALUNO.id || !lessonId) return;
  try{
    await db.collection("progresso").doc(ALUNO.id+"_"+lessonId).set({
      alunoId: ALUNO.id, alunoNome: ALUNO.nome, licaoId: lessonId, disciplina: subjId,

      acertos: sess.acertos, erros: sess.erros, xpGanho: sess.xpGanho, total: sess.total,
      concluido: true, concluidoEm: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge:true });
  }catch(e){ /* best-effort */ }
}

function launchConfetti(){
  const host=document.getElementById("celebrate"); if(!host) return;
  const cores=["#58cc02","#1cb0f6","#ffc800","#ff4b4b","#ff7eb9","#9b59b6"];
  for(let i=0;i<70;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=(Math.random()*100)+"%";
    c.style.background=cores[i%cores.length];
    c.style.animationDuration=(2+Math.random()*2)+"s";
    c.style.animationDelay=(Math.random()*0.6)+"s";
    c.style.borderRadius = Math.random()>.5?"50%":"2px";
    host.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

// Força a regeneração do resumo de estudo e atualiza o cache compartilhado (licoes_geradas).
async function regenerarConteudoIA(){
  syncTextInputs();
  const L=Teacher.editingLesson;
  if(!L || !L.id){ toast("Salve a lição primeiro para gerar o conteúdo compartilhado."); return; }
  const conteudo=(L.texto||"").trim();
  if(!conteudo){ Teacher.iaErro="Escreva o conteúdo da lição antes de gerar."; render(); return; }
  if(!IA.apiKey.trim()){ Teacher.iaErro="Chave da IA não configurada (peça ao Administrador)."; render(); return; }
  if(!confirm("Regenerar o resumo de estudo desta lição com IA? Isso substitui o resumo em cache para todos os dispositivos.")) return;
  Teacher.regenerando=true; Teacher.iaErro=""; render();
  const pub=descreverPublicoLicao(L);
  const prompt =
`Você é um professor do ${pub.ano} do ${nomeNivel(pub.nivelId)}.
Com base no conteúdo abaixo, crie um resumo didático e detalhado para o aluno estudar antes de responder exercícios.
O resumo deve:
- Ter linguagem clara e animada
- Usar exemplos do cotidiano adequados à faixa etária
- Destacar os pontos mais importantes em tópicos
- Ter no máximo 300 palavras
- Incluir uma dica de memorização no final
${pub.frase}
Conteúdo da lição: ${conteudo}`;
  try{
    const texto=await chamarIA(prompt, 20000);
    if(!texto.trim()) throw new Error("A IA retornou um resumo vazio. Tente novamente.");
    delete resumoCache[L.id];
    salvarLicaoGerada(L.id, { resumo:texto, exercicios:L.exercicios });
    Teacher.regenerando=false; render();
    toast("Resumo regenerado e salvo no cache! ✅");
  }catch(err){
    Teacher.regenerando=false;
    Teacher.iaErro = mensagemErroIA(err);
    render();
  }
}

// Chamada genérica à API da OpenAI. Retorna o texto; lança Error em falha.
// timeoutMs (opcional): aborta a requisição e lança Error("timeout") se estourar.
async function chamarIA(prompt, timeoutMs){
  if(!IA.apiKey.trim()) throw new Error("Sem chave de API configurada.");
  const ctrl = (typeof AbortController!=="undefined") ? new AbortController() : null;
  let timer=null, expirou=false;
  if(ctrl && timeoutMs){ timer=setTimeout(()=>{ expirou=true; try{ ctrl.abort(); }catch(_){} }, timeoutMs); }
  let resp;
  try{
    resp = await fetch(IA_ENDPOINT, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + IA.apiKey.trim()
      },
      body: JSON.stringify({
        model: IA_MODELO,
        messages:[{ role:"user", content: prompt }],
        temperature: 0.7
      }),
      signal: ctrl ? ctrl.signal : undefined
    });
  }catch(e){
    if(expirou || (e && e.name==="AbortError")) throw new Error("timeout");
    throw e;
  }finally{
    if(timer) clearTimeout(timer);
  }
  if(!resp.ok){
    let detalhe="";
    try{ const e=await resp.json(); detalhe = e.error && e.error.message ? e.error.message : ""; }catch(_){}
    if(resp.status===401) detalhe = detalhe || "Chave da API inválida.";
    if(resp.status===429) detalhe = detalhe || "Limite de uso atingido. Aguarde um pouco e tente novamente.";
    throw new Error(`Erro ${resp.status}${detalhe? " — "+detalhe : ""}`);
  }
  const data = await resp.json();
  return data.choices && data.choices[0] && data.choices[0].message
    ? (data.choices[0].message.content || "") : "";
}

// Mensagem de erro amigável e precisa para falhas da IA (uso nos painéis do professor/admin).
// Obs.: a OpenAI NÃO envia CORS nas respostas de erro (401/429), então o navegador bloqueia
// e o fetch vira "Failed to fetch" — por isso chave inválida/sem créditos parece "erro de rede".
function mensagemErroIA(err){
  let msg = (err && err.message) ? err.message : "Falha ao contatar a IA.";
  if(msg==="timeout") return "A IA demorou demais para responder. Tente novamente.";
  if(/Failed to fetch|NetworkError|Load failed/i.test(msg))
    return "Falha na chamada à OpenAI. Verifique, nesta ordem: (1) a chave é válida e a conta tem créditos/billing ativo; (2) a rede/firewall não bloqueia api.openai.com (redes corporativas costumam bloquear); (3) sua internet.";
  return msg;
}

// Monta o prompt e chama a IA para gerar exercícios (painel do professor)
async function gerarExerciciosIA(){
  syncTextInputs();
  const L=Teacher.editingLesson;
  const conteudo=(L.texto||"").trim();
  if(!conteudo){ Teacher.iaErro="Escreva o conteúdo da lição antes de gerar."; render(); return; }
  if(!IA.apiKey.trim()){ Teacher.iaErro="Configure a chave da API no ⚙️."; render(); return; }

  Teacher.gerando=true; Teacher.iaErro=""; render();

  const pub = descreverPublicoLicao(L);
  const prompt =
`Você é um professor do ${pub.ano} do ${nomeNivel(pub.nivelId)}.
Com base no conteúdo abaixo, gere exatamente 15 exercícios divididos em:
- 5 questões fáceis (conceitos básicos, linguagem simples)
- 5 questões intermediárias (aplicação do conceito)
- 5 questões difíceis (raciocínio, interpretação e análise)

${pub.frase}

Tipos permitidos: múltipla escolha (4 opções), verdadeiro/falso, completar lacunas.
Retorne APENAS um JSON válido, sem explicações, no formato:
[
  {"nivel": "facil", "tipo": "multipla_escolha", "enunciado": "...", "opcoes": ["A","B","C","D"], "resposta_correta": "A"},
  {"nivel": "intermediario", "tipo": "verdadeiro_falso", "enunciado": "...", "resposta_correta": "verdadeiro"},
  {"nivel": "dificil", "tipo": "completar_lacunas", "enunciado": "O ___ é usado quando...", "resposta_correta": "palavra correta"}
]
O campo "nivel" deve ser exatamente "facil", "intermediario" ou "dificil".
Conteúdo da lição: ${conteudo}`;

  try{
    const texto = await chamarIA(prompt, 45000);
    const novos = parseExerciciosIA(texto);
    if(!novos.length) throw new Error("A IA não retornou exercícios reconhecíveis. Tente novamente.");

    if(IA.modo==="acumular") L.exercicios = L.exercicios.concat(novos);
    else L.exercicios = novos;

    Teacher.gerando=false; Teacher.iaErro="";
    render();
    const cont = contarPorDificuldade(novos);
    toast(`✨ ${novos.length} exercícios (${cont.facil}F/${cont.intermediario}I/${cont.dificil}D)! Revise e salve.`);
  }catch(err){
    Teacher.gerando=false;
    Teacher.iaErro = mensagemErroIA(err);
    render();
  }
}

// Converte o JSON retornado pela IA para o formato interno de exercícios
function parseExerciciosIA(texto){
  if(!texto) return [];
  let s = texto.trim();
  // remove cercas de código ```json ... ```
  s = s.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"");
  // tenta extrair o array, caso venha com texto ao redor
  const ini=s.indexOf("["), fim=s.lastIndexOf("]");
  if(ini>=0 && fim>ini) s = s.slice(ini, fim+1);
  let arr;
  try{ arr = JSON.parse(s); }catch(e){ return []; }
  if(!Array.isArray(arr)) return [];

  const out=[];
  arr.forEach(item=>{
    if(!item || !item.enunciado) return;
    const tipo = String(item.tipo||"").toLowerCase();
    const resp = item.resposta_correta;
    const nivel = normalizarNivelDif(item.nivel);
    if(tipo.indexOf("verdadeiro")>=0 || tipo==="vf"){
      const v = norm(resp);
      out.push({ id:uid(), tipo:"vf", nivel, enunciado:String(item.enunciado),
        opcoes:["Verdadeiro","Falso"], correta:(v.charAt(0)==="v"||v==="true"||v==="1")?0:1 });
    } else if(tipo.indexOf("lacuna")>=0 || tipo.indexOf("completar")>=0 || tipo==="fill"){
      out.push({ id:uid(), tipo:"fill", nivel, enunciado:String(item.enunciado), resposta:String(resp==null?"":resp) });
    } else { // múltipla escolha (padrão)
      let opcoes = Array.isArray(item.opcoes)? item.opcoes.map(o=>String(o)) : [];
      if(opcoes.length<2) return;
      let correta = acharIndiceCorreto(opcoes, resp);
      out.push({ id:uid(), tipo:"mc", nivel, enunciado:String(item.enunciado), opcoes, correta });
    }
  });
  return out;
}
// Normaliza o nível de dificuldade vindo da IA (ignora acentos/variações).
function normalizarNivelDif(v){
  const n=norm(v);
  if(n.indexOf("facil")>=0) return "facil";
  if(n.indexOf("interm")>=0) return "intermediario";
  if(n.indexOf("dific")>=0) return "dificil";
  return "";
}
// Conta quantas questões há de cada dificuldade.
function contarPorDificuldade(arr){
  const c={ facil:0, intermediario:0, dificil:0 };
  (arr||[]).forEach(ex=>{ if(c[ex.nivel]!==undefined) c[ex.nivel]++; });
  return c;
}
// Descobre o índice da opção correta a partir de "resposta_correta" (texto da opção ou letra A/B/C/D)
function acharIndiceCorreto(opcoes, resp){
  if(resp==null) return 0;
  const r = String(resp).trim();
  // match exato por texto (ignora acentos/maiúsculas)
  let idx = opcoes.findIndex(o=>norm(o)===norm(r));
  if(idx>=0) return idx;
  // letra A-Z
  if(/^[a-zA-Z]$/.test(r)){
    const li = r.toUpperCase().charCodeAt(0)-65;
    if(li>=0 && li<opcoes.length) return li;
  }
  // contém o texto
  idx = opcoes.findIndex(o=>norm(o).indexOf(norm(r))>=0 && norm(r).length>0);
  return idx>=0 ? idx : 0;
}

// Card editor de um exercício. Reflete o estado em Teacher.editingLesson.exercicios[i]
function exEditorCard(ex,i){
  const tipoSel = `<select onchange="App.setExType(${i},this.value)">
    <option value="mc" ${ex.tipo==='mc'?'selected':''}>Múltipla escolha</option>
    <option value="vf" ${ex.tipo==='vf'?'selected':''}>Verdadeiro / Falso</option>
    <option value="fill" ${ex.tipo==='fill'?'selected':''}>Completar lacuna</option>
  </select>`;

  let corpo="";
  if(ex.tipo==="fill"){
    corpo = `<label>Resposta correta</label>
      <input value="${esc(ex.resposta||'')}" placeholder="Resposta esperada" oninput="App.setExResp(${i},this.value)">
      <p style="font-size:12px;color:var(--gray-d)">Use ____ no enunciado para indicar a lacuna. A correção ignora maiúsculas e acentos.</p>`;
  } else {
    const opcoes = ex.opcoes || [];
    corpo = `<label>Opções (marque a correta ✓)</label>` + opcoes.map((o,j)=>`
      <div class="opt-row">
        <button class="icon-btn pick" style="background:${ex.correta===j?'#58cc02':'#f0f0f0'};color:${ex.correta===j?'#fff':'#999'}" onclick="App.setCorrect(${i},${j})" title="Marcar como correta">✓</button>
        <input type="text" value="${esc(o)}" placeholder="Opção ${j+1}" oninput="App.setOpt(${i},${j},this.value)" ${ex.tipo==='vf'?'readonly style=background:#eee':''}>
        ${ex.tipo==='mc' && opcoes.length>2 ? `<button class="icon-btn" onclick="App.removeOpt(${i},${j})" title="Remover opção">✕</button>`:''}
      </div>`).join("") +
      (ex.tipo==='mc' && opcoes.length<6 ? `<button class="btn gray small" style="width:100%;margin-top:4px" onclick="App.addOpt(${i})">+ opção</button>`:'');
  }

  const nivelSel = `<select onchange="App.setExNivel(${i},this.value)">
    <option value="" ${!ex.nivel?'selected':''}>Sem nível</option>
    <option value="facil" ${ex.nivel==='facil'?'selected':''}>Fácil (+10 XP)</option>
    <option value="intermediario" ${ex.nivel==='intermediario'?'selected':''}>Intermediário (+20 XP)</option>
    <option value="dificil" ${ex.nivel==='dificil'?'selected':''}>Difícil (+30 XP)</option>
  </select>`;

  return `<div class="ex-edit-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b>Exercício ${i+1}</b>
      <button class="icon-btn" onclick="App.removeExercise(${i})" title="Remover exercício">🗑️</button>
    </div>
    <div style="display:flex;gap:8px">
      <div style="flex:1"><label>Tipo</label>${tipoSel}</div>
      <div style="flex:1"><label>Dificuldade</label>${nivelSel}</div>
    </div>
    <label>Enunciado</label>
    <input value="${esc(ex.enunciado||'')}" placeholder="Escreva a pergunta" oninput="App.setExEnun(${i},this.value)">
    ${corpo}
  </div>`;
}

function syncTextInputs(){
  if(!Teacher.editingLesson) return;
  // captura título e texto antes de re-renderizar (eles não têm oninput para evitar re-render no meio da digitação)
  const t=document.getElementById("lTitulo"), x=document.getElementById("lTexto");
  if(t) Teacher.editingLesson.titulo=t.value;
  if(x) Teacher.editingLesson.texto=x.value;
  // escopo da lição (turma/ano/nível)
  const nv=document.getElementById("lNivel"); if(nv) Teacher.editingLesson.nivel=nv.value;
  const an=document.getElementById("lAno");   if(an) Teacher.editingLesson.ano=an.value;
  const tu=document.getElementById("lTurma"); if(tu) Teacher.editingLesson.turma=tu.value;
}
function onLessonNivel(v){
  syncTextInputs();
  Teacher.editingLesson.nivel=v; Teacher.editingLesson.ano=""; // reseta o ano ao trocar de nível
  render();
}
function addExercise(){
  syncTextInputs();

  render();
}
function removeExercise(i){ syncTextInputs(); Teacher.editingLesson.exercicios.splice(i,1); render(); }
function setExType(i,t){
  syncTextInputs();
  const ex=Teacher.editingLesson.exercicios[i];
  ex.tipo=t;
  if(t==="vf"){ ex.opcoes=["Verdadeiro","Falso"]; if(ex.correta>1)ex.correta=0; delete ex.resposta; }
  else if(t==="mc"){ if(!ex.opcoes||ex.opcoes.length<2)ex.opcoes=["",""]; ex.correta=ex.correta||0; delete ex.resposta; }
  else if(t==="fill"){ ex.resposta=ex.resposta||""; }

}
function setExEnun(i,v){ Teacher.editingLesson.exercicios[i].enunciado=v; }
function setExResp(i,v){ Teacher.editingLesson.exercicios[i].resposta=v; }
function setExNivel(i,v){ syncTextInputs(); Teacher.editingLesson.exercicios[i].nivel=v; render(); }
function setOpt(i,j,v){ Teacher.editingLesson.exercicios[i].opcoes[j]=v; }
function setCorrect(i,j){ syncTextInputs(); Teacher.editingLesson.exercicios[i].correta=j; render(); }
function addOpt(i){ syncTextInputs(); Teacher.editingLesson.exercicios[i].opcoes.push(""); render(); }
function removeOpt(i,j){

  const ex=Teacher.editingLesson.exercicios[i];
  ex.opcoes.splice(j,1);
  if(ex.correta>=ex.opcoes.length) ex.correta=0;

async function saveLesson(){
  syncTextInputs();
  const L=Teacher.editingLesson;
  if(!L.titulo.trim()){ toast("Dê um título à lição."); return; }
  // validação dos exercícios
  for(let k=0;k<L.exercicios.length;k++){
    const ex=L.exercicios[k];
    if(!ex.enunciado.trim()){ toast(`Exercício ${k+1}: falta o enunciado.`); return; }
    if(ex.tipo==="fill"){
      if(!ex.resposta || !ex.resposta.trim()){ toast(`Exercício ${k+1}: informe a resposta.`); return; }
    } else {
      if(ex.opcoes.some(o=>!o.trim())){ toast(`Exercício ${k+1}: preencha todas as opções.`); return; }
    }
  }

  const disc = Teacher.subj;
  const payload = {
    disciplina: disc,
    titulo: L.titulo,
    conteudo: L.texto,
    exercicios: L.exercicios,
    turma: L.turma||"",
    ano: L.ano||"",
    nivel: L.nivel||""
  };
  toast("Salvando...");
  try{
    if(L.id){ // editar existente — invalida o conteúdo de IA (o material pode ter mudado)
      await db.collection("licoes").doc(L.id).set({
        ...payload,
        resumoIA: "",
        explicacoes: firebase.firestore.FieldValue.delete()
      }, { merge:true });
    } else { // nova
      payload.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection("licoes").add(payload);
      L.id = ref.id;
    }
    // limpa o cache (memória + nuvem) do conteúdo gerado — o material pode ter mudado
    delete resumoCache[L.id];
    if(L.id) limparLicaoGerada(L.id);
    // atualiza o estado local (remove de onde estava e re-adiciona na disciplina atual)
    removeLicaoLocal(L.id);
    if(!DATA[disc]) DATA[disc]=[];
    DATA[disc].push({ id:L.id, titulo:L.titulo, texto:L.texto, exercicios:L.exercicios, resumoIA:"", explicacoes:{}, turma:L.turma||"", ano:L.ano||"", nivel:L.nivel||"" });

    Teacher.editingLesson=null; Teacher.tab="licoes";
    toast("Lição salva com sucesso! ✅");
    render();
  }catch(e){
    toast("Erro ao salvar. Verifique a conexão e tente novamente.");
  }
}

// --- ABA: rendimento das turmas ---
// Carrega alunos das turmas do professor e seus registros de progresso.
async function carregarRendimento(){
  Teacher.prog.carregando=true; Teacher.prog.erro=""; render();
  try{
    const turmas = (PROFESSOR && Array.isArray(PROFESSOR.turmas)) ? PROFESSOR.turmas : [];
    let alunos=[];
    if(turmas.length){
      if(turmas.length<=10){
        const snap = await db.collection("alunos").where("turma","in",turmas).get();
        snap.forEach(d=> alunos.push(Object.assign({ id:d.id }, d.data())));
      } else { // 'in' aceita no máximo 10 valores → carrega todos e filtra
        const snap = await db.collection("alunos").get();
        snap.forEach(d=>{ const a=d.data(); if(turmas.indexOf(a.turma)>=0) alunos.push(Object.assign({ id:d.id }, a)); });
      }
    }
    const ids = {}; alunos.forEach(a=> ids[a.id]=true);
    const progresso=[];
    const snapP = await db.collection("progresso").get();
    snapP.forEach(d=>{ const p=d.data(); if(ids[p.alunoId]) progresso.push(p); });
    Teacher.prog.alunos=alunos; Teacher.prog.progresso=progresso;
    Teacher.prog.carregada=true; Teacher.prog.carregando=false; render();
  }catch(e){
    Teacher.prog.carregando=false; Teacher.prog.carregada=true;
    Teacher.prog.erro="Não foi possível carregar o rendimento. Verifique a conexão e as regras do Firestore.";
    render();
  }
}
function recarregarRendimento(){ Teacher.prog.carregada=false; carregarRendimento(); }

async function redefinirSenhaAluno(id){
  const aluno=(Teacher.prog.alunos||[]).find(a=>a.id===id);
  const nome = aluno ? aluno.nome : "o aluno";
  const nova = prompt(`Nova senha para ${nome}:`);
  if(nova===null) return; // cancelou
  const s = String(nova).trim();
  if(s.length<3){ toast("A senha deve ter ao menos 3 caracteres."); return; }
  try{
    const hash = await hashSenha(s);
    await db.collection("alunos").doc(id).set({ senha:hash }, { merge:true });
    toast("Senha redefinida! ✅");
  }catch(e){ toast("Erro ao redefinir a senha. Verifique a conexão."); }
}
async function removerAluno(id){
  const aluno=(Teacher.prog.alunos||[]).find(a=>a.id===id);
  const nome = aluno ? aluno.nome : "este aluno";
  if(!confirm(`Remover ${nome}? A conta e o histórico de progresso dele serão excluídos. Esta ação não pode ser desfeita.`)) return;
  try{
    // remove os registros de progresso do aluno (best-effort) e a conta
    try{ const snap=await db.collection("progresso").where("alunoId","==",id).get(); await Promise.all(snap.docs.map(d=>d.ref.delete())); }catch(_){}
    await db.collection("alunos").doc(id).delete();
    Teacher.prog.alunos = (Teacher.prog.alunos||[]).filter(a=>a.id!==id);
    Teacher.prog.progresso = (Teacher.prog.progresso||[]).filter(p=>p.alunoId!==id);
    toast("Aluno removido.");
    render();
  }catch(e){ toast("Erro ao remover o aluno. Verifique a conexão."); }
}
function setProgTurma(v){ Teacher.prog.fTurma=v; render(); }
function setProgDisc(v){ Teacher.prog.fDisc=v; render(); }
function setProgPeriodo(v){ Teacher.prog.fPeriodo=v; render(); }

function periodoLimiteSeg(p){
  if(p==="7")  return Math.floor(Date.now()/1000) - 7*86400;
  if(p==="30") return Math.floor(Date.now()/1000) - 30*86400;
  return null;
}
// Aplica os filtros (turma/disciplina/período) e devolve alunos + progresso filtrados.
function rendimentoFiltrado(){
  const P=Teacher.prog, limite=periodoLimiteSeg(P.fPeriodo);
  const alunos = P.alunos.filter(a=> !P.fTurma || a.turma===P.fTurma);
  const idSet={}; alunos.forEach(a=> idSet[a.id]=true);
  const prog = P.progresso.filter(p=>{
    if(!idSet[p.alunoId]) return false;
    if(P.fDisc && p.disciplina!==P.fDisc) return false;
    if(limite && p.concluidoEm && p.concluidoEm.seconds && p.concluidoEm.seconds<limite) return false;
    return true;
  });
  return { alunos, prog };
}
// Quantas lições estão disponíveis para um aluno (respeitando turma/ano), opcional por disciplina.
function totalLicoesAluno(aluno, discId){
  let n=0;
  SUBJECTS.forEach(s=>{ if(discId && s.id!==discId) return; n += (DATA[s.id]||[]).filter(l=>licaoVisivelPara(l,aluno)).length; });
  return n;
}

          <option value="30" ${P.fPeriodo==='30'?'selected':''}>Últimos 30 dias</option>
        </select>
      </div>
    </div>
    <button class="btn gray small" style="width:100%;margin:4px 0 6px" onclick="App.recarregarRendimento()">🔄 Atualizar dados</button>`;

  if(P.erro) return filtros + `<div class="ia-erro">⚠️ ${esc(P.erro)}</div>`;

  const resumo = `<div class="stat-row" style="margin:10px 0 4px">
    <div class="stat-pill" style="background:#ede7f6;color:#5e35b1"><div class="v">${alunos.length}</div><div class="l">Alunos</div></div>
    <div class="stat-pill" style="background:#e3f2fd;color:#1565c0"><div class="v">${totConcl}</div><div class="l">Lições feitas</div></div>
    <div class="stat-pill" style="background:#e8f5e9;color:#2e7d32"><div class="v">${mediaAcertos}%</div><div class="l">Média acertos</div></div>
  </div>`;

  // ----- Gráfico de barras: % de conclusão por disciplina (turma) -----
  const discList = P.fDisc ? SUBJECTS.filter(s=>s.id===P.fDisc) : SUBJECTS;
  let barras = discList.map(s=>{
    let possiveis=0; alunos.forEach(a=> possiveis += (DATA[s.id]||[]).filter(l=>licaoVisivelPara(l,a)).length);
    const feitas = prog.filter(p=>p.disciplina===s.id).length;
    const pct = possiveis ? Math.round(feitas/possiveis*100) : 0;
    if(possiveis===0) return "";
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span>${s.icon} ${esc(s.nome)}</span><b style="color:${s.cor}">${pct}%</b></div>
      <div class="prog-bar-mini"><div style="width:${pct}%;background:${s.cor}"></div></div>
    </div>`;
  }).join("");
  if(!barras.trim()) barras = `<p style="color:var(--gray-d);font-size:13px">Sem lições cadastradas para estas turmas ainda.</p>`;
  const grafico = `<div class="sec-title">Conclusão por disciplina</div><div class="card" style="cursor:default">${barras}</div>`;

  // ----- Ranking por XP -----
  const rank = alunos.slice().sort((a,b)=> (b.xpTotal||0)-(a.xpTotal||0));

      <div class="info"><div class="t">${esc(a.nome)}</div><div class="d">Turma ${esc(a.turma||'-')} • ${esc(a.ano||'')}</div></div>
      <b style="color:#9b59b6">⭐ ${a.xpTotal||0}</b>
    </div>`).join("");

  // ----- Lista de alunos: % concluído e média de acertos -----
  const lista = `<div class="sec-title">Alunos (${alunos.length})</div>` + alunos.slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(a=>{
    const pAluno = prog.filter(p=>p.alunoId===a.id);
    const possiveis = totalLicoesAluno(a, P.fDisc||null);
    const feitas = pAluno.length;
    const pct = possiveis ? Math.round(feitas/possiveis*100) : 0;
    const ct = pAluno.filter(p=>p.total>0);
    const acc = ct.length ? Math.round(ct.reduce((s,p)=>s+(p.acertos/p.total*100),0)/ct.length) : 0;
    return `<div class="card" style="cursor:default">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><b>${esc(a.nome)}</b>
          <div style="font-size:12px;color:var(--gray-d)">Turma ${esc(a.turma||'-')} • ⭐ ${a.xpTotal||0} XP • ${feitas}/${possiveis} lições • ✅ ${acc}% acertos</div></div>
        <b style="color:#9b59b6">${pct}%</b>
      </div>
      <div class="prog-bar-mini"><div style="width:${pct}%;background:#9b59b6"></div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn gray small" style="flex:1" onclick="App.redefinirSenhaAluno('${a.id}')">🔑 Redefinir senha</button>
        <button class="btn red small" style="flex:1" onclick="App.removerAluno('${a.id}')">🗑️ Remover</button>
      </div>
    </div>`;
  }).join("");

  return filtros + resumo + grafico + ranking + lista;
}
