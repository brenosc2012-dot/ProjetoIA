  // para que turmas antigas em formato diferente possam ser DESMARCADAS e removidas.
  const todasTurmas = TURMAS_LETRAS.slice();
  C.turmas.forEach(t=>{ if(todasTurmas.indexOf(t)<0) todasTurmas.push(t); });
  const turmaChips = `<div style="display:flex;flex-wrap:wrap">` + todasTurmas.map(t=>{
    const on=C.turmas.indexOf(t)>=0;
    const legada = TURMAS_LETRAS.indexOf(t)<0;
    return `<button type="button" class="btn small ${on?'':'gray'}" style="width:auto;min-width:64px;margin:0 8px 8px 0" onclick="App.toggleContaTurma('${esc(t)}')">${on?'✓ ':''}Turma ${esc(t)}${legada?' ✕':''}</button>`;
  }).join("") + `</div>
    <p style="font-size:12px;color:#999;margin:-2px 0 6px">Turmas marcadas com ✕ são antigas (fora do padrão A–F). Toque para desmarcar e salve para removê-las.</p>`;
  const discChips = SUBJECTS.map(s=>{
    const on=C.disc.indexOf(s.id)>=0;
    return `<button type="button" class="opt" style="margin-bottom:8px;${on?'border-color:var(--blue);background:#ddf4ff;color:#1899d6':''}" onclick="App.toggleContaDisc('${s.id}')">
      <span>${s.icon} ${esc(s.nome)}</span><span style="margin-left:auto">${on?'✓':''}</span></button>`;
  }).join("");
  const btn = C.salvando
    ? `<button class="btn" disabled><span class="ia-spinner" style="width:18px;height:18px;border-color:rgba(255,255,255,.4);border-top-color:#fff;vertical-align:middle"></span> Salvando...</button>`
    : `<button class="btn" onclick="App.salvarConta()">💾 Salvar alterações</button>`;
  return `<div style="text-align:center;margin-bottom:6px">
      <div style="font-size:18px;font-weight:800">${esc((PROFESSOR&&PROFESSOR.nome)||'')}</div>
      <div style="color:#777;font-size:13px">${esc((PROFESSOR&&PROFESSOR.email)||'')}</div>
    </div>
    <div class="sec-title">Turmas que leciona</div>
    ${turmaChips}
    <div class="sec-title">Disciplinas que leciona</div>
    ${discChips}
    ${btn}
    <p style="font-size:12px;color:#999;margin-top:8px">As turmas definidas aqui aparecem ao criar lições (campo "Turma") e no painel de rendimento. Use o mesmo formato de letra que os alunos (A, B, C…).</p>`;
}
function toggleContaTurma(t){ const a=Teacher.conta.turmas; const i=a.indexOf(t); if(i>=0)a.splice(i,1); else a.push(t); render(); }
function toggleContaDisc(id){ const a=Teacher.conta.disc; const i=a.indexOf(id); if(i>=0)a.splice(i,1); else a.push(id); render(); }
async function salvarConta(){
  const turmas=Teacher.conta.turmas.slice().sort(), disciplinas=Teacher.conta.disc.slice();
  if(!turmas.length){ toast("Selecione ao menos uma turma."); return; }
  if(!disciplinas.length){ toast("Selecione ao menos uma disciplina."); return; }
  if(!PROFESSOR || !PROFESSOR.id){ toast("Sessão inválida. Entre novamente."); return; }
  Teacher.conta.salvando=true; render();
  try{
    await db.collection("professores").doc(PROFESSOR.id).set({ turmas, disciplinas }, { merge:true });
    PROFESSOR.turmas=turmas; PROFESSOR.disciplinas=disciplinas;
    Teacher.conta.salvando=false; toast("Conta atualizada! ✅"); render();
  }catch(e){ Teacher.conta.salvando=false; toast("Erro ao salvar. Verifique a conexão."); render(); }
}

// ----- Telas globais de carregamento / erro -----
function mostrarCarregando(msg){
  app.innerHTML = `<div class="screen active">
    <div class="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
      ${mascot('bounce')}
      <div class="ia-loading" style="color:var(--brand)"><span class="ia-spinner"></span> ${esc(msg)}</div>
    </div>
  </div>`;
}
function mostrarErroConexao(){
  app.innerHTML = `<div class="screen active">
    <div class="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
      <div style="font-size:60px">📡</div>
      <h1 style="color:var(--red);font-size:22px;margin:8px 0">Ops! Sem conexão</h1>
      <p style="color:#777;margin-bottom:20px">Não foi possível carregar as lições do servidor.<br>Verifique sua internet e tente novamente.</p>
      <button class="btn" onclick="App.retryBoot()">🔄 Tentar novamente</button>
    </div>
  </div>`;
}

// Restaura o usuário logado (aluno/professor) a partir da sessão local.
async function restaurarSessao(){
  if(!SESSAO){ State.tela="landing"; return; }
  try{
    if(SESSAO.tipo==="aluno"){
      const doc = await db.collection("alunos").doc(SESSAO.id).get();
      if(doc.exists){ const data=Object.assign({}, doc.data(), { id:doc.id }); delete data.criadoEm; definirAlunoLogado(data); State.tela="home"; inicializarAluno(); return; }
    } else if(SESSAO.tipo==="professor"){
      const doc = await db.collection("professores").doc(SESSAO.id).get();
      if(doc.exists){ PROFESSOR=Object.assign({}, doc.data(), { id:doc.id }); State.tela="teacher"; Teacher.tab="licoes"; return; }
    }
    // doc não existe mais → volta ao landing
    SESSAO=null; salvarSessao(); State.tela="landing";
  }catch(e){
    // sem rede: tenta o cache local do aluno
    if(SESSAO.tipo==="aluno"){
      try{ const c=JSON.parse(localStorage.getItem(ALUNO_CACHE_KEY)||"null"); if(c && c.id===SESSAO.id){ definirAlunoLogado(c.doc); State.tela="home"; return; } }catch(_){}
    }
    State.tela="landing";
  }
}

// Boot — IA/sessão do localStorage; lições/contas do Firestore
async function boot(){
  loadIA();
  carregarSessao();
  SUBJECTS.forEach(s=> DATA[s.id]=DATA[s.id]||[]);
  mostrarCarregando("Carregando...");
  try{
    initFirebase();
    await carregarChaveIA();   // chave da OpenAI compartilhada (Firestore)
    await ouvirLicoes();       // listener em tempo real; resolve no primeiro snapshot
    await restaurarSessao();   // recarrega aluno/professor logado, se houver
    render();
  }catch(e){
    mostrarErroConexao();
  }
}
boot();

if("serviceWorker" in navigator && location.protocol!=="file:"){
  window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
}
